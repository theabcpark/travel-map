<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 여행 기록 — Travel Memoir</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Sans+KR:wght@200;300;400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
:root {
  --bg:      #07090f;
  --ocean:   #0a1322;
  --land:    #1a2b1a;
  --land-h:  #2c472c;
  --gold:    #c9a96e;
  --gold-l:  #e8cfa0;
  --gold-d:  #7a5f35;
  --text:    #f0ead8;
  --muted:   #6b6050;
  --visited: #b8955a;
  --vis-h:   #d4aa70;
  --panel-w: 420px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  font-weight:200;
  min-height:100vh;
  overflow-x:hidden;
  cursor:none;
}

/* CURSOR */
#cur,#cring{
  position:fixed;border-radius:50%;
  pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
}
#cur{width:7px;height:7px;background:var(--gold);transition:width .15s,height .15s;}
#cring{width:32px;height:32px;border:1px solid rgba(201,169,110,.45);transition:width .2s,height .2s,opacity .2s;}

/* STARS */
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;}

/* GRAIN */
body::after{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:1;opacity:.55;
}

/* LAYOUT */
.page{position:relative;z-index:2;}

/* HEADER */
header{text-align:center;padding:64px 24px 28px;position:relative;}
.eyebrow{
  font-family:'DM Mono',monospace;font-size:10px;
  letter-spacing:6px;text-transform:uppercase;
  color:var(--gold);opacity:0;animation:rise .9s .1s forwards;
}
header h1{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(3rem,7vw,6.5rem);font-weight:300;
  line-height:1;letter-spacing:-1px;margin:10px 0 8px;
  opacity:0;animation:rise .9s .25s forwards;
}
header h1 em{font-style:italic;color:var(--gold);}
.sub{
  font-family:'DM Mono',monospace;font-size:11px;
  letter-spacing:3px;color:var(--muted);
  opacity:0;animation:rise .9s .4s forwards;
}
.rule{
  width:1px;height:48px;
  background:linear-gradient(to bottom,var(--gold),transparent);
  margin:22px auto 0;
  opacity:0;animation:rise .9s .55s forwards;
}

/* STATS */
.stats{
  display:flex;justify-content:center;
  margin:0 auto 24px;max-width:560px;
  border:1px solid rgba(201,169,110,.14);
  opacity:0;animation:rise .9s .7s forwards;
}
.stat{
  flex:1;text-align:center;padding:20px 14px;
  border-right:1px solid rgba(201,169,110,.14);
}
.stat:last-child{border-right:none;}
.sn{
  font-family:'Cormorant Garamond',serif;
  font-size:2.5rem;font-weight:300;
  color:var(--gold);line-height:1;display:block;
}
.sl{
  font-family:'DM Mono',monospace;font-size:9px;
  letter-spacing:3px;text-transform:uppercase;
  color:var(--muted);margin-top:4px;display:block;
}

/* MAP */
.map-wrap{
  max-width:1300px;margin:0 auto;
  padding:0 18px 18px;
  opacity:0;animation:rise 1.1s .9s forwards;
}
.map-frame{
  position:relative;
  background:var(--ocean);
  border:1px solid rgba(201,169,110,.12);
  box-shadow:
    0 0 0 1px rgba(201,169,110,.05),
    0 40px 120px rgba(0,0,0,.65),
    inset 0 0 100px rgba(0,0,0,.45);
  overflow:hidden;
}
.map-frame::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 48%,
    transparent 45%,rgba(7,9,15,.55) 100%);
  pointer-events:none;z-index:5;
}

/* ZOOM CONTROLS */
.zoom-controls{
  position:absolute;bottom:18px;right:18px;
  display:flex;flex-direction:column;gap:4px;
  z-index:10;
}
.zoom-btn{
  width:34px;height:34px;
  background:rgba(10,13,20,.88);
  border:1px solid rgba(201,169,110,.28);
  color:var(--gold);
  font-size:18px;line-height:1;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .18s,border-color .18s;
  backdrop-filter:blur(8px);
  font-family:'DM Mono',monospace;
  user-select:none;
}
.zoom-btn:hover{background:rgba(201,169,110,.15);border-color:var(--gold);}
.zoom-btn:active{background:rgba(201,169,110,.25);}
.zoom-divider{width:34px;height:1px;background:rgba(201,169,110,.15);}

/* Region shortcuts */
.region-btns{
  position:absolute;top:12px;left:12px;
  display:flex;flex-wrap:wrap;gap:5px;
  z-index:10;max-width:320px;
}
.region-btn{
  padding:5px 10px;
  background:rgba(10,13,20,.82);
  border:1px solid rgba(201,169,110,.22);
  color:rgba(201,169,110,.8);
  font-family:'DM Mono',monospace;
  font-size:9px;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;
  transition:background .18s,color .18s,border-color .18s;
  backdrop-filter:blur(8px);
  white-space:nowrap;
}
.region-btn:hover{background:rgba(201,169,110,.15);color:var(--gold);border-color:var(--gold);}
.region-btn.active{background:rgba(201,169,110,.18);color:var(--gold);border-color:var(--gold);}

/* Zoom hint */
.zoom-hint{
  position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;
  color:rgba(107,96,80,.6);pointer-events:none;z-index:10;
  white-space:nowrap;
}

/* grabbing cursor on map */
#mSvg{cursor:grab;}
#mSvg.grabbing{cursor:grabbing;}

/* D3 paths */
.graticule{fill:none;stroke:rgba(255,255,255,.045);stroke-width:.4;}
.sphere{fill:var(--ocean);}
.country{
  fill:var(--land);
  stroke:#060809;stroke-width:.35;
  cursor:default;
  transition:fill .22s,filter .22s;
}
.country.vis{
  fill:var(--visited);
  filter:drop-shadow(0 0 5px rgba(184,149,90,.3));
  cursor:pointer;
}
.country:hover{fill:var(--land-h);}
.country.vis:hover{
  fill:var(--vis-h);
  filter:drop-shadow(0 0 12px rgba(212,170,112,.6)) brightness(1.08);
}

/* LEGEND */
.legend{
  display:flex;align-items:center;justify-content:center;
  gap:28px;padding:13px;
  opacity:0;animation:rise .9s 1.1s forwards;
}
.li{display:flex;align-items:center;gap:8px;}
.ld{width:10px;height:10px;border-radius:50%;}
.ld.v{background:var(--visited);box-shadow:0 0 6px rgba(184,149,90,.45);}
.ld.u{background:var(--land);}
.lt{
  font-family:'DM Mono',monospace;font-size:9px;
  letter-spacing:3px;text-transform:uppercase;color:var(--muted);
}

/* TOOLTIP */
#tip{
  position:fixed;pointer-events:none;z-index:300;
  opacity:0;transition:opacity .18s;
  transform:translate(-50%,-115%);
}
#tip.show{opacity:1;}
.tbox{
  background:rgba(12,15,22,.96);
  border:1px solid rgba(201,169,110,.28);
  padding:10px 16px;text-align:center;
  backdrop-filter:blur(14px);min-width:130px;
  position:relative;
}
.tbox::after{
  content:'';position:absolute;bottom:-6px;left:50%;
  transform:translateX(-50%);
  width:10px;height:6px;
  background:rgba(12,15,22,.96);
  clip-path:polygon(0 0,100% 0,50% 100%);
}
.tflag{font-size:26px;display:block;margin-bottom:3px;}
.tname{
  font-family:'Cormorant Garamond',serif;
  font-size:15px;font-weight:400;color:var(--text);display:block;
}
.tdate{
  font-family:'DM Mono',monospace;font-size:9px;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--gold);margin-top:3px;display:block;
}

/* PANEL */
#panel{
  position:fixed;top:0;right:calc(-1 * var(--panel-w) - 4px);
  width:var(--panel-w);height:100vh;
  background:rgba(9,11,16,.97);
  border-left:1px solid rgba(201,169,110,.16);
  z-index:400;overflow-y:auto;
  transition:right .55s cubic-bezier(.77,0,.175,1);
  backdrop-filter:blur(24px);
}
#panel.open{right:0;}
#panel::-webkit-scrollbar{width:3px;}
#panel::-webkit-scrollbar-thumb{background:var(--gold-d);border-radius:2px;}

.phero{
  width:100%;height:240px;
  display:flex;align-items:center;justify-content:center;
  font-size:88px;
  background:linear-gradient(145deg,#0f180f,#182618);
  position:relative;overflow:hidden;flex-shrink:0;
}
.phero::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:70px;
  background:linear-gradient(to top,rgba(9,11,16,.97),transparent);
}
.pbody{padding:28px 30px 44px;}
.pflag{font-size:32px;margin-bottom:6px;}
.pname{
  font-family:'Cormorant Garamond',serif;
  font-size:2.3rem;font-weight:300;line-height:1;margin-bottom:5px;
}
.pdate{
  font-family:'DM Mono',monospace;font-size:9px;
  letter-spacing:4px;text-transform:uppercase;
  color:var(--gold);margin-bottom:22px;display:block;
}
.prule{width:36px;height:1px;background:var(--gold);margin-bottom:20px;}
.pmemo{
  font-size:13.5px;line-height:2;
  color:rgba(240,234,216,.72);
  margin-bottom:28px;word-break:keep-all;font-family:'Noto Sans KR',sans-serif;
}
.pgrid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:6px;margin-bottom:26px;
}
.pphoto{
  aspect-ratio:1;background:#111a11;
  display:flex;align-items:center;justify-content:center;
  font-size:36px;cursor:pointer;
  transition:transform .2s,filter .2s;
}
.pphoto:hover{transform:scale(.96);filter:brightness(1.15);}
.pbtn{
  display:block;width:100%;padding:14px;
  text-align:center;border:1px solid var(--gold);
  color:var(--gold);font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:4px;text-transform:uppercase;
  cursor:pointer;background:none;
  transition:background .2s,color .2s;
}
.pbtn:hover{background:var(--gold);color:var(--bg);}
.pclose{
  position:absolute;top:18px;right:20px;
  width:34px;height:34px;
  border:1px solid rgba(201,169,110,.22);
  background:none;color:var(--gold);
  cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s;z-index:10;
}
.pclose:hover{background:rgba(201,169,110,.1);}

/* OVERLAY */
#ov{
  position:fixed;inset:0;
  background:rgba(0,0,0,.42);
  z-index:390;opacity:0;
  pointer-events:none;transition:opacity .4s;
}
#ov.show{opacity:1;pointer-events:all;}

/* FOOTER */
footer{
  text-align:center;padding:40px;
  font-family:'DM Mono',monospace;font-size:9px;
  letter-spacing:4px;text-transform:uppercase;
  color:var(--muted);position:relative;z-index:2;
}

@keyframes rise{
  from{opacity:0;transform:translateY(18px);}
  to{opacity:1;transform:translateY(0);}
}
@media(max-width:640px){
  :root{--panel-w:100vw;}
  header h1{font-size:3rem;}
}
</style>
</head>
<body>

<div id="cur"></div>
<div id="cring"></div>
<div id="stars"></div>
<div id="ov"></div>

<div id="tip">
  <div class="tbox">
    <span class="tflag" id="tF">🌍</span>
    <span class="tname" id="tN">—</span>
    <span class="tdate" id="tD">—</span>
  </div>
</div>

<div id="panel">
  <button class="pclose" id="pCl">✕</button>
  <div class="phero" id="pHero">🌍</div>
  <div class="pbody">
    <div class="pflag" id="pFlg"></div>
    <h2 class="pname" id="pNm"></h2>
    <span class="pdate" id="pDt"></span>
    <div class="prule"></div>
    <p class="pmemo" id="pMm"></p>
    <div class="pgrid" id="pGr"></div>
    <button class="pbtn" id="pBt">전체 여행기 보기 →</button>
  </div>
</div>

<div class="page">
  <header>
    <p class="eyebrow">Travel Memoir</p>
    <h1>나의 <em>여행</em> 기록</h1>
    <p class="sub">지도 위 금빛 나라를 눌러 추억을 펼쳐보세요</p>
    <div class="rule"></div>
  </header>

  <div class="stats">
    <div class="stat"><span class="sn" id="sCnt">—</span><span class="sl">방문 국가</span></div>
    <div class="stat"><span class="sn" id="sCon">5</span><span class="sl">대륙</span></div>
    <div class="stat"><span class="sn">2024</span><span class="sl">최근 여행</span></div>
  </div>

  <div class="map-wrap">
    <div class="map-frame" id="mFrame">
      <svg id="mSvg"></svg>

      <!-- Region shortcuts -->
      <div class="region-btns">
        <button class="region-btn active" data-region="world">🌍 전체</button>
        <button class="region-btn" data-region="europe">🇪🇺 유럽</button>
        <button class="region-btn" data-region="asia">🌏 아시아</button>
        <button class="region-btn" data-region="americas">🌎 아메리카</button>
        <button class="region-btn" data-region="africa">🌍 아프리카</button>
        <button class="region-btn" data-region="oceania">🦘 오세아니아</button>
      </div>

      <!-- Zoom buttons -->
      <div class="zoom-controls">
        <button class="zoom-btn" id="zIn" title="확대">+</button>
        <div class="zoom-divider"></div>
        <button class="zoom-btn" id="zOut" title="축소">−</button>
        <div class="zoom-divider"></div>
        <button class="zoom-btn" id="zReset" title="초기화" style="font-size:13px;">⌂</button>
      </div>

      <div class="zoom-hint">스크롤로 확대 · 드래그로 이동</div>
    </div>
  </div>

  <div class="legend">
    <div class="li"><div class="ld v"></div><span class="lt">방문한 국가</span></div>
    <div class="li"><div class="ld u"></div><span class="lt">미방문 국가</span></div>
  </div>

  <footer>© 나의 여행 기록 &nbsp;·&nbsp; Made with ♥</footer>
</div>

<script>
/* ── TRAVEL DATA ── */

  'Vietnam':{

    memo:'하롱베이 석회암 섬들 사이의 새벽 안개, 호이안의 등불 축제. 뜨거운 쌀국수 한 그릇에 담긴 깊은 맛과 현지인의 따뜻한 미소.',
    photos:['⛵','🏮','🍜','🌿'],link:'#vietnam'
  },
  'Indonesia':{
    flag:'🇮🇩',name:'인도네시아',date:'2023년 10월',
    memo:'발리 우붓의 라이스 테라스와 물 위의 사원 탄롯. 인도양으로 떨어지는 황금빛 노을, 가믈란 음악이 흐르는 저녁.',
    photos:['🌾','🛕','🌊','🌺'],link:'#indonesia'

/* ── D3 MAP ── */
const frame=document.getElementById('mFrame');
const svg=d3.select('#mSvg');
const tip=document.getElementById('tip');

/* Region bounding boxes [lon0,lat0,lon1,lat1] */
const REGIONS={
  world:  [-180,-85,180,85],
  europe: [-12,34,40,72],
  asia:   [25,-10,145,55],
  americas:[-170,-60,-30,75],
  africa: [-20,-38,55,38],
  oceania:[110,-50,180,20],
};

let gProj, gPath, gZoom, gSvgEl, gW, gH, gWorldData=null;
let isDragging=false;

function draw(world){
  gWorldData=world;
  gW=frame.clientWidth;
  gH=Math.round(gW*.5);
  svg.attr('width',gW).attr('height',gH);
  svg.selectAll('*').remove();

  gProj=d3.geoNaturalEarth1()
    .scale(gW/6.28)
    .translate([gW/2,gH/2]);
  gPath=d3.geoPath().projection(gProj);

  /* zoom behaviour */
  gZoom=d3.zoom()
    .scaleExtent([1,18])
    .translateExtent([[0,0],[gW,gH]])
    .on('start',()=>{ svg.node().classList.add('grabbing'); })
    .on('zoom',(ev)=>{
      mapG.attr('transform',ev.transform);
      /* scale stroke inversely so borders stay thin */
      mapG.selectAll('.country')
        .style('stroke-width', 0.35/ev.transform.k + 'px');
    })
    .on('end',()=>{ svg.node().classList.remove('grabbing'); });

  svg.call(gZoom);

  /* click on ocean resets tooltip */
  svg.on('click',function(ev){
    if(ev.target===this || ev.target.classList.contains('sphere'))
      tip.classList.remove('show');
  });

  const mapG=svg.append('g').attr('id','mapG');

  /* sphere */
  mapG.append('path')
    .datum({type:'Sphere'})
    .attr('class','sphere')
    .attr('d',gPath);

  /* graticule */
  mapG.append('path')
    .datum(d3.geoGraticule()())
    .attr('class','graticule')
    .attr('d',gPath);

  /* countries */
  const features=topoFeature(world,'countries');
  mapG.selectAll('.country')
    .data(features)
    .join('path')
    .attr('class',d=>{
      const n=d.properties.name;
      return 'country'+(VISITED.has(n)?' vis':'');
    })
    .attr('d',gPath)
    .on('mouseenter',function(ev,d){
      const n=d.properties.name;
      const info=T[n];
      document.getElementById('tF').textContent=info?info.flag:'🌐';
      document.getElementById('tN').textContent=info?info.name:n;
      document.getElementById('tD').textContent=info?info.date:'미방문';
      tip.classList.add('show');
      if(info) bigCursor(true);
    })
    .on('mousemove',function(ev){
      tip.style.left=ev.clientX+'px';
      tip.style.top=ev.clientY+'px';
    })
    .on('mouseleave',function(){
      tip.classList.remove('show');
      bigCursor(false);
    })
    .on('click',function(ev,d){
      ev.stopPropagation();
      const n=d.properties.name;
      if(T[n]) openP(n);
    });

  document.getElementById('sCnt').textContent=VISITED.size;
}

/* ── ZOOM TO REGION ── */
function zoomToRegion(key){
  const [lon0,lat0,lon1,lat1]=REGIONS[key];
  /* convert geo bbox to screen coords */
  const p0=gProj([lon0,lat1]); /* top-left in screen */
  const p1=gProj([lon1,lat0]); /* bottom-right */
  if(!p0||!p1) return;
  const bW=p1[0]-p0[0], bH=p1[1]-p0[1];
  const scale=Math.min(gW/bW, gH/bH)*0.88;
  const tx=gW/2-(p0[0]+bW/2)*scale;
  const ty=gH/2-(p0[1]+bH/2)*scale;
  const t=d3.zoomIdentity.translate(tx,ty).scale(scale);
  svg.transition().duration(700).ease(d3.easeCubicInOut).call(gZoom.transform,t);
}

/* minimal topojson decoder (no external lib) */
function topoFeature(topo,layerName){
  const obj=topo.objects[layerName]||topo.objects[Object.keys(topo.objects)[0]];
  const sc=topo.transform?topo.transform.scale:[1,1];
  const tr=topo.transform?topo.transform.translate:[0,0];

  function decodeArc(idx){
    const raw=topo.arcs[idx<0?~idx:idx];
    let x=0,y=0;
    const pts=raw.map(([dx,dy])=>{x+=dx;y+=dy;return[x*sc[0]+tr[0],y*sc[1]+tr[1]];});
    return idx<0?pts.slice().reverse():pts;
  }
  function ring(arcs){
    return arcs.flatMap((a,i)=>{
      const c=decodeArc(a);
      return i===0?c:c.slice(1);
    });
  }
  function geom(g){
    if(!g) return null;
    if(g.type==='Point') return{type:'Point',coordinates:g.coordinates};
    if(g.type==='MultiPoint') return{type:'MultiPoint',coordinates:g.coordinates};
    if(g.type==='LineString') return{type:'LineString',coordinates:ring(g.arcs)};
    if(g.type==='MultiLineString') return{type:'MultiLineString',coordinates:g.arcs.map(ring)};
    if(g.type==='Polygon') return{type:'Polygon',coordinates:g.arcs.map(ring)};
    if(g.type==='MultiPolygon') return{type:'MultiPolygon',coordinates:g.arcs.map(a=>a.map(ring))};
    if(g.type==='GeometryCollection') return{type:'GeometryCollection',geometries:g.geometries.map(geom)};
    return null;
  }
  return obj.geometries.map(g=>{
    const p=Object.assign({},g.properties||{});
    if(!p.name) p.name=ID2N[+g.id]||('Region-'+g.id);
    return{type:'Feature',id:g.id,properties:p,geometry:geom(g)};
  });
}
