<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지구별 여행자 — Travel Memoir</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Sans+KR:wght@400;700&family=DM+Mono:wght@300;400&display=swap');

:root {
  --bg:      #07090f;
  --ocean:   #0a1322;
  --land:    #1a2b1a;
  --land-h:  #2c472c;
  --gold:    #c9a96e;
  --gold-l:  #e8cfa0;
  --gold-d:  #7a5f35;
  --text:    #f0ead8;
  --muted:   #6b6050;
  --visited: #b8955a;
  --vis-h:   #d4aa70;
  --panel-w: 420px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  font-weight:400;
  min-height:100vh;
  overflow-x:hidden;
  cursor:none;
}

/* CURSOR */
#cur,#cring{
  position:fixed;border-radius:50%;
  pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
}
#cur{width:7px;height:7px;background:var(--gold);transition:width .15s,height .15s;}
#cring{width:32px;height:32px;border:1px solid rgba(201,169,110,.45);transition:width .2s,height .2s,opacity .2s;}

/* STARS */
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;}

/* GRAIN */
body::after{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:1;opacity:.55;
}

.page{position:relative;z-index:2;}

/* HEADER */
header{text-align:center;padding:28px 24px 16px;}
.eyebrow{
  font-family:'DM Mono',monospace;font-size:13px;
  letter-spacing:6px;text-transform:uppercase;
  color:var(--gold);opacity:0;animation:rise .9s .1s forwards;
}
header h1{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(3rem,7vw,6.5rem);font-weight:300;
  line-height:1;letter-spacing:-1px;margin:28px 0 8px;
  opacity:0;animation:rise .9s .25s forwards;
}
header h1 em{font-style:italic;color:var(--gold);}
.sub{
  font-size:19px;letter-spacing:1px;color:var(--muted);
  font-weight:700;line-height:1.9;
  opacity:0;animation:rise .9s .4s forwards;
}
/* 데스크탑: br 숨기기 */
.sub .line-break{display:none;}
@media(max-width:640px){
  .sub .line-break{display:none;}
  .sub{font-size:13px;letter-spacing:0;white-space:nowrap;}
}

@media(max-width:700px){
  :root{--panel-w:100vw;}
  header h1{font-size:3rem;}
  footer{padding:10px 20px;}
}

.rule{
  width:1px;height:48px;
  background:linear-gradient(to bottom,var(--gold),transparent);
  margin:22px auto 0;
  opacity:0;animation:rise .9s .55s forwards;
}

/* STATS */
.stats{
  display:flex;justify-content:center;
  margin:0 auto 24px;max-width:560px;
  border:1px solid rgba(201,169,110,.14);
  opacity:0;animation:rise .9s .7s forwards;
}
.stat{
  flex:1;text-align:center;padding:12px 20px;
  border-right:1px solid rgba(201,169,110,.14);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.stat:last-child{border-right:none;}
.sn{
  font-family:'Cormorant Garamond',serif;
  font-size:2.8rem;font-weight:300;
  color:var(--gold);line-height:1.15;display:block;
  cursor:pointer;white-space:nowrap;
  text-decoration:underline;
  text-underline-offset:6px;
  text-decoration-color:rgba(201,169,110,.5);
  text-decoration-thickness:1px;
  transition:color .18s,text-shadow .18s,text-decoration-color .18s;
}
.sn:hover{
  color:var(--gold-l);
  text-shadow:0 0 20px rgba(201,169,110,.5);
  text-decoration-color:var(--gold-l);
}
.sn .unit{font-size:1.3rem;vertical-align:baseline;margin:0 1px;}
.sl{
  font-size:16px;letter-spacing:1px;font-weight:700;
  color:var(--muted);margin-top:8px;display:block;
}

/* MAP WRAP */
.map-wrap{
  max-width:1300px;margin:0 auto;
  padding:0 18px 18px;
  opacity:0;animation:rise 1.1s .9s forwards;
}

.map-frame{
  position:relative;
  background:var(--ocean);
  border:1px solid rgba(201,169,110,.12);
  box-shadow:
    0 0 0 1px rgba(201,169,110,.05),
    0 40px 120px rgba(0,0,0,.65),
    inset 0 0 100px rgba(0,0,0,.45);
  overflow:hidden;
}
.map-frame::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 48%,
    transparent 45%,rgba(7,9,15,.55) 100%);
  pointer-events:none;z-index:5;
}

/* Region buttons */
.region-row-mobile{ display:none; }

/* 데스크탑: 지도 안 좌측 상단 세로 */
.region-col{
  position:absolute;top:14px;left:14px;
  display:flex;flex-direction:column;gap:5px;
  z-index:10;
}

/* 모바일: 지도 위 가로 한 줄 — 기본 숨김 */
.region-bar{
  display:none;
  gap:5px;
  margin-bottom:8px;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.region-bar::-webkit-scrollbar{display:none;}

.region-btn{
  padding:7px 14px;
  background:rgba(10,13,20,.85);
  border:1px solid rgba(201,169,110,.22);
  color:rgba(201,169,110,.8);
  font-family:'Noto Sans KR',sans-serif;
  font-size:13px;font-weight:700;
  cursor:pointer;
  transition:background .18s,color .18s,border-color .18s;
  backdrop-filter:blur(10px);
  white-space:nowrap;
  flex-shrink:0;
  text-align:left;
}
.region-btn:hover{background:rgba(201,169,110,.15);color:var(--gold);border-color:var(--gold);}
.region-btn.active{background:rgba(201,169,110,.2);color:var(--gold);border-color:var(--gold);}

@media(max-width:700px){
  /* 모바일: 지도 안 버튼 숨기고, 위 가로 행 표시 */
  .region-col{display:none;}
  .region-bar{
    display:flex;
    flex-direction:row;
    flex-wrap:nowrap;
    overflow-x:visible;
  }
  .region-bar .region-btn{
    flex:1;
    font-size:10px;
    padding:5px 2px;
    text-align:center;
    min-width:0;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  /* 줌 버튼 가로 배치 */
  .zoom-controls{
    flex-direction:row !important;
    gap:4px;
  }
  .zoom-divider{
    width:1px !important;height:34px;
  }
}

/* ZOOM CONTROLS */
.zoom-controls{
  position:absolute;bottom:14px;right:14px;
  display:flex;flex-direction:column;gap:4px;
  z-index:10;
}
.zoom-btn{
  width:34px;height:34px;
  background:rgba(10,13,20,.88);
  border:1px solid rgba(201,169,110,.28);
  color:var(--gold);
  font-size:18px;line-height:1;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .18s,border-color .18s;
  backdrop-filter:blur(8px);
  font-family:'DM Mono',monospace;
  user-select:none;
}
.zoom-btn:hover{background:rgba(201,169,110,.15);border-color:var(--gold);}
.zoom-btn:active{background:rgba(201,169,110,.25);}
.zoom-divider{width:34px;height:1px;background:rgba(201,169,110,.15);}

/* D3 paths */
.graticule{fill:none;stroke:rgba(255,255,255,.045);stroke-width:.4;}
.sphere{fill:var(--ocean);}
.country{
  fill:var(--land);stroke:#060809;stroke-width:.35;
  cursor:default;transition:fill .22s,filter .22s;
}
.country.vis{
  fill:var(--visited);
  filter:drop-shadow(0 0 5px rgba(184,149,90,.3));
  cursor:pointer;
}
.country:hover{fill:var(--land-h);}
.country.vis:hover{
  fill:var(--vis-h);
  filter:drop-shadow(0 0 12px rgba(212,170,112,.6)) brightness(1.08);
}
#mSvg{cursor:grab;display:block;}
#mSvg.grabbing{cursor:grabbing;}

/* LEGEND — vertical */
.legend{
  position:absolute;bottom:14px;left:14px;
  display:flex;flex-direction:column;gap:5px;
  z-index:10;
  opacity:0;animation:rise .9s 1.1s forwards;
}
.li{display:flex;align-items:center;gap:6px;}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ld.v{background:var(--visited);box-shadow:0 0 4px rgba(184,149,90,.5);}
.ld.u{background:var(--land);}
.lt{
  font-size:11px;letter-spacing:0.5px;
  color:rgba(240,232,216,.7);font-weight:700;
  text-shadow:0 1px 3px rgba(0,0,0,.8);
}
@media(max-width:700px){
  .legend{bottom:14px;left:8px;gap:3px;}
  .ld{width:6px;height:6px;}
  .lt{font-size:9px;}
}

/* TOOLTIP */
#tip{
  position:fixed;pointer-events:none;z-index:300;
  opacity:0;transition:opacity .18s;
  transform:translate(-50%,-115%);
}
#tip.show{opacity:1;}
.tbox{
  background:rgba(12,15,22,.96);
  border:1px solid rgba(201,169,110,.28);
  padding:10px 16px;text-align:center;
  backdrop-filter:blur(14px);min-width:130px;
  position:relative;
}
.tbox::after{
  content:'';position:absolute;bottom:-6px;left:50%;
  transform:translateX(-50%);
  width:10px;height:6px;
  background:rgba(12,15,22,.96);
  clip-path:polygon(0 0,100% 0,50% 100%);
}
.tflag{font-size:26px;display:block;margin-bottom:3px;}
.tname{
  font-family:'Cormorant Garamond',serif;
  font-size:16px;font-weight:400;color:var(--text);display:block;
}
.tdate{
  font-size:12px;letter-spacing:2px;
  color:var(--gold);margin-top:3px;display:block;
}

/* SIDE PANEL */
#panel{
  position:fixed;top:0;right:calc(-1 * var(--panel-w) - 4px);
  width:var(--panel-w);height:100vh;
  background:rgba(9,11,16,.97);
  border-left:1px solid rgba(201,169,110,.16);
  z-index:400;overflow-y:auto;
  transition:right .55s cubic-bezier(.77,0,.175,1);
  backdrop-filter:blur(24px);
}
#panel.open{right:0;}
#panel::-webkit-scrollbar{width:3px;}
#panel::-webkit-scrollbar-thumb{background:var(--gold-d);border-radius:2px;}
.phero{
  width:100%;height:240px;
  display:flex;align-items:center;justify-content:center;
  font-size:88px;
  background:linear-gradient(145deg,#0f180f,#182618);
  position:relative;overflow:hidden;flex-shrink:0;
}
.phero::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:70px;
  background:linear-gradient(to top,rgba(9,11,16,.97),transparent);
}
.pbody{padding:28px 30px 44px;}
.pflag{font-size:32px;margin-bottom:6px;}
.pname{
  font-family:'Cormorant Garamond',serif;
  font-size:2.3rem;font-weight:300;line-height:1;margin-bottom:5px;
}
.pdate{
  font-size:13px;letter-spacing:3px;
  color:var(--gold);margin-bottom:22px;display:block;
}
.prule{width:36px;height:1px;background:var(--gold);margin-bottom:20px;}
.pmemo{
  font-size:15px;line-height:2;font-weight:400;
  color:rgba(240,234,216,.72);
  margin-bottom:28px;word-break:keep-all;
}
.pgrid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:5px;margin-bottom:26px;
}
.pphoto{
  aspect-ratio:1;background:#111a11;
  overflow:hidden;cursor:pointer;position:relative;
  transition:transform .2s,filter .2s;
}
.pphoto img{
  width:100%;height:100%;object-fit:cover;
  display:block;transition:transform .3s;
}
.pphoto:hover img{transform:scale(1.06);}
.pphoto-empty{
  aspect-ratio:1;background:#111a11;
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);font-size:11px;letter-spacing:1px;
  border:1px dashed rgba(201,169,110,.15);
}

/* GALLERY MODAL */
#gallery{
  position:fixed;inset:0;z-index:600;
  opacity:0;pointer-events:none;transition:opacity .35s;
  display:flex;flex-direction:column;
}
#gallery.show{opacity:1;pointer-events:all;}
.gallery-bg{position:absolute;inset:0;background:rgba(5,7,12,.96);backdrop-filter:blur(8px);}
.gallery-inner{
  position:relative;z-index:1;
  display:flex;flex-direction:column;
  height:100%;overflow:hidden;
}
.gallery-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 28px;border-bottom:1px solid rgba(201,169,110,.12);
  flex-shrink:0;
}
.gallery-title-wrap{}
.gallery-flag{font-size:22px;margin-right:8px;}
.gallery-name{
  font-family:'Cormorant Garamond',serif;
  font-size:1.6rem;font-weight:300;color:var(--text);
}
.gallery-count{
  font-size:13px;color:var(--muted);margin-left:10px;
}
.gallery-close{
  background:none;border:1px solid rgba(201,169,110,.25);
  color:var(--gold);width:36px;height:36px;
  cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s;flex-shrink:0;
}
.gallery-close:hover{background:rgba(201,169,110,.1);}
.gallery-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:3px;
  overflow-y:auto;
  padding:3px;
  flex:1;
}
.gallery-grid::-webkit-scrollbar{width:3px;}
.gallery-grid::-webkit-scrollbar-thumb{background:var(--gold-d);border-radius:2px;}
.gallery-item{
  aspect-ratio:1;overflow:hidden;cursor:pointer;
  position:relative;background:#0d1018;
}
.gallery-item img{
  width:100%;height:100%;object-fit:cover;
  display:block;transition:transform .3s,filter .3s;
}
.gallery-item:hover img{transform:scale(1.05);filter:brightness(1.1);}
.gallery-item-empty{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  color:rgba(107,96,80,.4);font-size:11px;
}

/* LIGHTBOX */
#lightbox{
  position:fixed;inset:0;z-index:700;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
#lightbox.show{opacity:1;pointer-events:all;}
.lb-bg{position:absolute;inset:0;background:rgba(0,0,0,.92);}
.lb-img-wrap{
  position:relative;z-index:1;
  max-width:92vw;max-height:88vh;
  display:flex;align-items:center;justify-content:center;
}
.lb-img-wrap img{
  max-width:100%;max-height:88vh;
  object-fit:contain;
  box-shadow:0 20px 60px rgba(0,0,0,.8);
  display:block;
}
.lb-close{
  position:fixed;top:20px;right:24px;z-index:2;
  background:none;border:1px solid rgba(255,255,255,.2);
  color:white;width:40px;height:40px;
  cursor:pointer;font-size:20px;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s;
}
.lb-close:hover{background:rgba(255,255,255,.1);}
.lb-prev,.lb-next{
  position:fixed;top:50%;z-index:2;
  transform:translateY(-50%);
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.15);
  color:white;width:46px;height:46px;
  cursor:pointer;font-size:22px;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s;
}
.lb-prev{left:16px;}.lb-next{right:16px;}
.lb-prev:hover,.lb-next:hover{background:rgba(255,255,255,.15);}
.lb-counter{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  font-size:13px;color:rgba(255,255,255,.5);letter-spacing:2px;
  z-index:2;
}
.pbtn{
  display:block;width:100%;padding:14px;
  text-align:center;border:1px solid var(--gold);
  color:var(--gold);font-size:14px;letter-spacing:3px;
  cursor:pointer;background:none;
  transition:background .2s,color .2s;
}
.pbtn:hover{background:var(--gold);color:var(--bg);}
.pclose{
  position:absolute;top:18px;right:20px;
  width:34px;height:34px;
  border:1px solid rgba(201,169,110,.22);
  background:none;color:var(--gold);
  cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s;z-index:10;
}
.pclose:hover{background:rgba(201,169,110,.1);}

/* OVERLAY */
#ov{
  position:fixed;inset:0;background:rgba(0,0,0,.42);
  z-index:390;opacity:0;pointer-events:none;transition:opacity .4s;
}
#ov.show{opacity:1;pointer-events:all;}

/* POPUP (visited list / recent) */
#popup{
  position:fixed;inset:0;z-index:500;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .35s;
}
#popup.show{opacity:1;pointer-events:all;}
.popup-bg{
  position:absolute;inset:0;background:rgba(0,0,0,.65);
  backdrop-filter:blur(6px);
}
.popup-box{
  position:relative;z-index:1;
  background:#0d1018;
  border:1px solid rgba(201,169,110,.25);
  width:min(800px,92vw);
  max-height:80vh;overflow-y:auto;
  padding:40px 36px 36px;
  box-shadow:0 40px 100px rgba(0,0,0,.8);
}
@media(max-width:700px){
  .popup-box{width:96vw;padding:36px 16px 24px;}
}
.popup-box::-webkit-scrollbar{width:3px;}
.popup-box::-webkit-scrollbar-thumb{background:var(--gold-d);border-radius:2px;}
.popup-close{
  position:absolute;top:16px;right:18px;
  background:none;border:1px solid rgba(201,169,110,.22);
  color:var(--gold);width:32px;height:32px;
  cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s;
}
.popup-close:hover{background:rgba(201,169,110,.1);}
.popup-title{
  font-family:'Cormorant Garamond',serif;
  font-size:2rem;font-weight:300;
  margin-bottom:6px;
}
.popup-sub{
  font-size:13px;letter-spacing:1px;color:var(--muted);
  margin-bottom:28px;display:block;
}
.popup-rule{width:36px;height:1px;background:var(--gold);margin-bottom:28px;}

/* visited list grid */
.vlist{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:10px;
}
.vitem{
  display:flex;align-items:center;gap:10px;
  padding:14px 12px;
  border:1px solid rgba(201,169,110,.12);
  cursor:pointer;
  transition:background .18s,border-color .18s;
  min-width:0;
}
.vitem:hover{background:rgba(201,169,110,.08);border-color:rgba(201,169,110,.3);}
.vitem-flag{font-size:24px;flex-shrink:0;}
.vitem-info{min-width:0;}
.vitem-name{font-size:16px;font-weight:700;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.vitem-date{font-size:13px;color:var(--gold);margin-top:2px;display:block;font-weight:400;white-space:nowrap;}
@media(max-width:700px){
  .vlist{grid-template-columns:1fr 1fr;gap:6px;}
  .vitem{padding:10px 10px;gap:8px;}
  .vitem-flag{font-size:24px;}
  .vitem-name{font-size:16px;}
  .vitem-date{font-size:13px;}
}

/* recent country card */
.recent-card{
  display:flex;align-items:center;gap:20px;
  padding:24px;
  border:1px solid rgba(201,169,110,.2);
  cursor:pointer;
  transition:background .18s;
  margin-bottom:20px;
}
.recent-card:hover{background:rgba(201,169,110,.06);}
.recent-flag{font-size:52px;}
.recent-info{}
.recent-name{
  font-family:'Cormorant Garamond',serif;
  font-size:2rem;font-weight:300;display:block;margin-bottom:4px;
}
.recent-date{font-size:15px;color:var(--gold);display:block;margin-bottom:8px;font-weight:700;}
.recent-memo{font-size:15px;line-height:1.8;color:rgba(240,234,216,.65);word-break:keep-all;font-weight:400;}

/* FOOTER */
footer{
  text-align:center;padding:20px;
  font-size:11px;letter-spacing:2px;font-weight:400;
  color:var(--muted);position:relative;z-index:2;
}

@keyframes rise{
  from{opacity:0;transform:translateY(18px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
</head>
<body>

<div id="cur"></div>
<div id="cring"></div>
<div id="stars"></div>

/* ── CURSOR ── */
const $c=document.getElementById('cur');
const $r=document.getElementById('cring');
let mx=0,my=0,rx=0,ry=0,curLarge=false;
document.addEventListener('mousemove',e=>{
  mx=e.clientX;my=e.clientY;
  $c.style.left=mx+'px';$c.style.top=my+'px';
});
(function tick(){
  rx+=(mx-rx)*.1;ry+=(my-ry)*.1;
  $r.style.left=rx+'px';$r.style.top=ry+'px';
  requestAnimationFrame(tick);
})();
function bigCursor(on){
  if(on===curLarge)return;curLarge=on;
  $c.style.width=on?'14px':'7px';$c.style.height=on?'14px':'7px';
  $r.style.width=on?'50px':'32px';$r.style.height=on?'50px':'32px';
  $r.style.opacity=on?'.8':'.45';
  $r.style.borderColor=on?'rgba(201,169,110,.85)':'rgba(201,169,110,.45)';
}

/* ── SIDE PANEL ── */
const panel=document.getElementById('panel');
const ov=document.getElementById('ov');
function closeP(){panel.classList.remove('open');ov.classList.remove('show');}
document.getElementById('pCl').onclick=closeP;
ov.onclick=closeP;
function openP(name){
  const d=T[name];if(!d)return;
  document.getElementById('pFlg').textContent=d.flag;
  document.getElementById('pNm').textContent=d.name;
  document.getElementById('pDt').textContent=d.date;
  document.getElementById('pMm').textContent=d.memo;

  /* 썸네일 2×2 그리드 */
  const g=document.getElementById('pGr');
  g.innerHTML='';
  const thumbCount=4;
  for(let i=0;i<thumbCount;i++){
    if(d.thumbs && d.thumbs[i]){
      const el=document.createElement('div');
      el.className='pphoto';
      const img=document.createElement('img');
      img.src=d.folder+'/'+d.thumbs[i];
      img.alt=d.name+' '+(i+1);
      img.onerror=()=>{el.className='pphoto-empty';el.textContent='사진 준비 중';};
      el.appendChild(img);
      const idx=i;
      el.onclick=()=>openLightbox(
        d.thumbs.map(t=>d.folder+'/'+t), idx
      );
      g.appendChild(el);
    } else {
      const el=document.createElement('div');
      el.className='pphoto-empty';
      el.textContent='사진 준비 중';
      g.appendChild(el);
    }
  }

  /* 전체 사진 보기 버튼 */
  document.getElementById('pBt').onclick=()=>openGallery(name);

  panel.classList.add('open');ov.classList.add('show');
}

/* ── GALLERY ── */
const gallery=document.getElementById('gallery');
let currentGalleryKey='';

function openGallery(key){
  const d=T[key]; if(!d)return;
  currentGalleryKey=key;
  document.getElementById('galleryFlag').textContent=d.flag;
  document.getElementById('galleryName').textContent=d.name;
  const imgs=d.gallery&&d.gallery.length?d.gallery:d.thumbs||[];

  const grid=document.getElementById('galleryGrid');
  grid.innerHTML='';

  /* 실제 로드된 이미지만 추적 */
  let loadedImgs=[];

  imgs.forEach((file,i)=>{
    if(!file) return;
    const item=document.createElement('div');
    item.className='gallery-item';
    const img=document.createElement('img');
    img.src=d.folder+'/'+file;
    img.alt=d.name+' '+(i+1);
    img.loading='lazy';
    /* 로드 성공 시 클릭 이벤트 연결 */
    img.onload=()=>{
      loadedImgs.push(d.folder+'/'+file);
      const idx=loadedImgs.length-1;
      item.onclick=()=>openLightbox(loadedImgs.slice(), idx);
      /* 이미 붙어있는 다른 아이템들도 idx 재계산 필요 — lightbox에서 src 기준으로 찾기 */
      item.dataset.src=d.folder+'/'+file;
    };
    /* 로드 실패 시 DOM에서 제거 */
    img.onerror=()=>{
      item.remove();
      document.getElementById('galleryCount').textContent=
        grid.querySelectorAll('.gallery-item').length+'장';
    };
    item.appendChild(img);
    /* 클릭 시 src 기준으로 현재 로드된 이미지 목록에서 인덱스 찾기 */
    item.onclick=()=>{
      const allItems=[...grid.querySelectorAll('.gallery-item img')].map(im=>im.src);
      const clickedIdx=[...grid.querySelectorAll('.gallery-item img')].indexOf(img);
      openLightbox(allItems, clickedIdx);
    };
    grid.appendChild(item);
  });

  document.getElementById('galleryCount').textContent=imgs.length+'장';
  gallery.classList.add('show');
}

/* ── LIGHTBOX ── */
const lightbox=document.getElementById('lightbox');
let lbImages=[], lbIndex=0;

function openLightbox(images,index){
  lbImages=images; lbIndex=index;
  showLbImage();
  lightbox.classList.add('show');
}
function closeLightbox(){lightbox.classList.remove('show');}
function showLbImage(){
  document.getElementById('lbImg').src=lbImages[lbIndex];
  document.getElementById('lbCounter').textContent=(lbIndex+1)+' / '+lbImages.length;
  document.getElementById('lbPrev').style.display=lbImages.length<2?'none':'flex';
  document.getElementById('lbNext').style.display=lbImages.length<2?'none':'flex';
}
document.getElementById('lbClose').onclick=closeLightbox;
document.getElementById('lbBg').onclick=closeLightbox;
document.getElementById('lbPrev').onclick=()=>{lbIndex=(lbIndex-1+lbImages.length)%lbImages.length;showLbImage();};
document.getElementById('lbNext').onclick=()=>{lbIndex=(lbIndex+1)%lbImages.length;showLbImage();};
/* 키보드 */
document.addEventListener('keydown',e=>{
  if(!lightbox.classList.contains('show'))return;
  if(e.key==='ArrowLeft')document.getElementById('lbPrev').click();
  if(e.key==='ArrowRight')document.getElementById('lbNext').click();
  if(e.key==='Escape')closeLightbox();
});

/* ── D3 MAP ── */
const frame=document.getElementById('mFrame');
const svg=d3.select('#mSvg');
const tip=document.getElementById('tip');

const REGIONS={
  world:  [-180,-85,180,85],
  europe: [-12,34,40,72],
  asia:   [25,-10,145,55],
  americas:[-170,-60,-30,75],
  africa: [-20,-38,55,38],
  oceania:[110,-50,180,20],
};

let gProj,gPath,gZoom,gW,gH;

function draw(world){
  gW=frame.clientWidth;
  /* 모바일에서 지도 높이를 더 크게 */
  const isMobile=window.innerWidth<=700;
  gH=Math.round(gW*(isMobile?0.75:0.5));
  svg.attr('width',gW).attr('height',gH);
  svg.selectAll('*').remove();

  /* 모바일에서 전체 지도가 딱 맞게 보이도록 scale 조정 */
  const baseScale=isMobile?gW/5.0:gW/6.28;
  /* 모바일에서 지도를 살짝 왼쪽으로 이동해 뉴질랜드가 안 잘리게 */
  const translateX=isMobile?gW/2-20:gW/2;
  gProj=d3.geoNaturalEarth1().scale(baseScale).translate([translateX,gH/2]);
  gPath=d3.geoPath().projection(gProj);

  gZoom=d3.zoom()
    .scaleExtent([1,18])
    .translateExtent([[0,0],[gW,gH]])
    .on('start',()=>svg.node().classList.add('grabbing'))
    .on('zoom',ev=>{
      mapG.attr('transform',ev.transform);
      mapG.selectAll('.country').style('stroke-width',0.35/ev.transform.k+'px');
    })
    .on('end',()=>svg.node().classList.remove('grabbing'));

  svg.call(gZoom);
  svg.on('click',function(ev){
    if(ev.target===this||ev.target.classList.contains('sphere'))
      tip.classList.remove('show');
  });

  const mapG=svg.append('g').attr('id','mapG');
  mapG.append('path').datum({type:'Sphere'}).attr('class','sphere').attr('d',gPath);
  mapG.append('path').datum(d3.geoGraticule()()).attr('class','graticule').attr('d',gPath);

  const features=topoFeature(world,'countries');
  mapG.selectAll('.country')
    .data(features).join('path')
    .attr('class',d=>'country'+(VISITED.has(d.properties.name)?' vis':''))
    .attr('d',gPath)
    .on('mouseenter',function(ev,d){
      const n=d.properties.name,info=T[n];
      document.getElementById('tF').textContent=info?info.flag:'🌐';
      document.getElementById('tN').textContent=info?info.name:n;
      document.getElementById('tD').textContent=info?info.date:'미방문';
      tip.classList.add('show');
      if(info)bigCursor(true);
    })
    .on('mousemove',ev=>{
      tip.style.left=ev.clientX+'px';tip.style.top=ev.clientY+'px';
    })
    .on('mouseleave',()=>{tip.classList.remove('show');bigCursor(false);})
    .on('click',function(ev,d){
      ev.stopPropagation();
      if(T[d.properties.name])openP(d.properties.name);
    });

  document.getElementById('sCnt').textContent=VISITED.size;
  /* 최근 여행 날짜 — "2024년 3월" → 숫자는 크게, 년/월은 작게 */
  const recentEntry=Object.values(T).sort((a,b)=>b.recent-a.recent)[0];
  const dateStr=recentEntry.date; /* e.g. "2024년 3월" */
  const formatted=dateStr.replace(/(\d+)(년|월)/g,'$1<span class="unit">$2</span>');
  document.getElementById('sYear').innerHTML=formatted;
}

/* zoom to region */
function zoomToRegion(key){
  const [lon0,lat0,lon1,lat1]=REGIONS[key];
  const p0=gProj([lon0,lat1]),p1=gProj([lon1,lat0]);
  if(!p0||!p1)return;
  const bW=p1[0]-p0[0],bH=p1[1]-p0[1];
  const scale=Math.min(gW/bW,gH/bH)*0.88;
  const tx=gW/2-(p0[0]+bW/2)*scale,ty=gH/2-(p0[1]+bH/2)*scale;
  svg.transition().duration(700).ease(d3.easeCubicInOut)
    .call(gZoom.transform,d3.zoomIdentity.translate(tx,ty).scale(scale));
}

document.getElementById('zIn').onclick=()=>svg.transition().duration(350).call(gZoom.scaleBy,1.6);
document.getElementById('zOut').onclick=()=>svg.transition().duration(350).call(gZoom.scaleBy,0.625);
document.getElementById('zReset').onclick=()=>{
  svg.transition().duration(600).ease(d3.easeCubicInOut).call(gZoom.transform,d3.zoomIdentity);
  document.querySelectorAll('.region-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-region="world"]').classList.add('active');
};

document.querySelectorAll('.region-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.region-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    if(btn.dataset.region==='world'){
      /* 전체 = 홈 버튼과 동일하게 초기 상태로 리셋 */
      svg.transition().duration(600).ease(d3.easeCubicInOut)
        .call(gZoom.transform,d3.zoomIdentity);
    } else {
      zoomToRegion(btn.dataset.region);
    }
  });
});

/* topojson decoder */
function topoFeature(topo,layer){
  const obj=topo.objects[layer]||topo.objects[Object.keys(topo.objects)[0]];
  const sc=topo.transform?topo.transform.scale:[1,1];
  const tr=topo.transform?topo.transform.translate:[0,0];
  function decodeArc(idx){
    const raw=topo.arcs[idx<0?~idx:idx];
    let x=0,y=0;
    const pts=raw.map(([dx,dy])=>{x+=dx;y+=dy;return[x*sc[0]+tr[0],y*sc[1]+tr[1]];});
    return idx<0?pts.slice().reverse():pts;
  }
  function ring(arcs){return arcs.flatMap((a,i)=>{const c=decodeArc(a);return i===0?c:c.slice(1);});}
  function geom(g){
    if(!g)return null;
    if(g.type==='Point')return{type:'Point',coordinates:g.coordinates};
    if(g.type==='MultiPoint')return{type:'MultiPoint',coordinates:g.coordinates};
    if(g.type==='LineString')return{type:'LineString',coordinates:ring(g.arcs)};
    if(g.type==='MultiLineString')return{type:'MultiLineString',coordinates:g.arcs.map(ring)};
    if(g.type==='Polygon')return{type:'Polygon',coordinates:g.arcs.map(ring)};
    if(g.type==='MultiPolygon')return{type:'MultiPolygon',coordinates:g.arcs.map(a=>a.map(ring))};
    if(g.type==='GeometryCollection')return{type:'GeometryCollection',geometries:g.geometries.map(geom)};
    return null;
  }
  return obj.geometries.map(g=>{
    const p=Object.assign({},g.properties||{});
    if(!p.name)p.name=ID2N[+g.id]||('Region-'+g.id);
    return{type:'Feature',id:g.id,properties:p,geometry:geom(g)};
  });
}
